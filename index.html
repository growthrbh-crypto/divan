<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIVAN | Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Inter",sans-serif;
  background:#f7f1e8;
  color:#1a1a1a;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 10%;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo{
  font-family:"Playfair Display";
  font-size:22px;
  letter-spacing:2px;
  color:#2a3b2f;
}

/* ===== HERO ===== */
.hero{
  height:90vh;
  background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(247,241,232,0.75);
}

.hero-content{
  position:relative;
}

.hero h1{
  font-family:"Playfair Display";
  font-size:60px;
  color:#2a3b2f;
}

.hero p{
  margin-top:10px;
  color:#777;
}

/* ===== PRODUCTS ===== */
section{
  padding:80px 10%;
  text-align:center;
}

h2{
  font-family:"Playfair Display";
  font-size:34px;
  margin-bottom:40px;
  color:#2a3b2f;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* صورة المنتج */
.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* محتوى المنتج */
.card-body{
  padding:15px;
}

.card h3{
  font-family:"Playfair Display";
  margin-bottom:5px;
}

.price{
  color:#b89b6a;
  margin:10px 0;
}

/* زر */
.btn{
  display:inline-block;
  padding:10px 20px;
  border:1px solid #b89b6a;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#b89b6a;
  color:white;
}

/* ===== CART ===== */
.cart{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:20px;
  box-shadow:-10px 0 30px rgba(0,0,0,0.1);
  transition:0.4s;
}

.cart.open{
  right:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}

.overlay.show{
  display:block;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:34px;}
}

</style>
</head>

<body>

<header>
  <div class="logo">DIVAN</div>
  <div onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Luxury Rituals</h1>
    <p>تجربة عناية فاخرة مستوحاة من الطبيعة</p>
  </div>
</section>

<!-- PRODUCTS -->
<section>
  <h2>منتجات ديفان</h2>

  <div class="grid">

    <!-- لوشن -->
    <div class="card">
      <img src="https://divansa.com/storage/images/products/360452681.jpg">
      <div class="card-body">
        <h3>لوشن + جل استحمام</h3>
        <div class="price">25.99 SAR</div>
        <div class="btn" onclick="add('لوشن')">أضف للسلة</div>
      </div>
    </div>

    <!-- شامبو -->
    <div class="card">
      <img src="https://divansa.com/storage/images/products/535672142.jpg">
      <div class="card-body">
        <h3>شامبو وبلسم</h3>
        <div class="price">22.55 SAR</div>
        <div class="btn" onclick="add('شامبو')">أضف للسلة</div>
      </div>
    </div>

    <!-- منتج ثالث -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1556228720-195a672e8a03">
      <div class="card-body">
        <h3>Glow Body Care</h3>
        <div class="price">40 SAR</div>
        <div class="btn" onclick="add('Glow')">أضف للسلة</div>
      </div>
    </div>

  </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>سلة المشتريات</h3>
  <div id="items"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<script>
let cart=[];
let count=0;

function add(name){
  cart.push(name);
  count++;
  document.getElementById("count").innerText=count;

  let items=document.getElementById("items");
  let div=document.createElement("div");
  div.innerText=name;
  items.appendChild(div);
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
</script>

</body>
</html>
