<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIVAN | Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ======================
   BASE
====================== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Inter",sans-serif;
  background:#f6f1e8;
  color:#1a1a1a;
}

/* ======================
   HEADER
====================== */
header{
  padding:20px 10%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  font-family:"Playfair Display",serif;
  font-size:22px;
  letter-spacing:2px;
}

.cart-btn{
  cursor:pointer;
  border:1px solid #b89b6a;
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
}

/* ======================
   HERO
====================== */
.hero{
  height:90vh;
  background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(246,241,232,0.75);
}

.hero-content{
  position:relative;
}

.hero h1{
  font-family:"Playfair Display",serif;
  font-size:56px;
  color:#2a3b2f;
}

.hero p{
  margin-top:10px;
  color:#666;
}

/* ======================
   PRODUCTS
====================== */
section{
  padding:80px 10%;
  text-align:center;
}

h2{
  font-family:"Playfair Display",serif;
  font-size:36px;
  margin-bottom:40px;
  color:#2a3b2f;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.05);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px);
}

.img{
  height:180px;
  border-radius:14px;
  background:linear-gradient(135deg,#e9e1d6,#f7f1e8);
  margin-bottom:15px;
}

.card h3{
  font-family:"Playfair Display",serif;
}

.price{
  color:#b89b6a;
  margin:8px 0;
}

/* ======================
   BUTTON
====================== */
.btn{
  display:inline-block;
  padding:10px 20px;
  border:1px solid #b89b6a;
  border-radius:25px;
  font-size:12px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#b89b6a;
  color:white;
}

/* ======================
   CART SIDEBAR
====================== */
.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-10px 0 30px rgba(0,0,0,0.1);
  padding:20px;
  transition:0.4s;
  z-index:100;
}

.cart.open{
  right:0;
}

.cart h3{
  font-family:"Playfair Display",serif;
  margin-bottom:20px;
}

.cart-item{
  margin-bottom:15px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}

/* ======================
   OVERLAY
====================== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}

.overlay.show{
  display:block;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:34px;}
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">DIVAN</div>
  <div class="cart-btn" onclick="toggleCart()">Cart 🛒 (<span id="count">0</span>)</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Luxury Ritual Store</h1>
    <p>Where skincare becomes elegance</p>
  </div>
</section>

<!-- PRODUCTS -->
<section>
  <h2>Signature Collection</h2>

  <div class="grid">

    <div class="card">
      <div class="img"></div>
      <h3>Silk Lotion</h3>
      <div class="price">$48</div>
      <div class="btn" onclick="add('Silk Lotion')">Add to Cart</div>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>Velvet Shampoo</h3>
      <div class="price">$32</div>
      <div class="btn" onclick="add('Velvet Shampoo')">Add to Cart</div>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>Glow Cleanser</h3>
      <div class="price">$40</div>
      <div class="btn" onclick="add('Glow Cleanser')">Add to Cart</div>
    </div>

  </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Ritual</h3>
  <div id="cartItems"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<script>

let cart = [];
let count = 0;

function add(item){
  cart.push(item);
  count++;
  document.getElementById("count").innerText = count;

  renderCart();
}

function renderCart(){
  let box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(i=>{
    let div = document.createElement("div");
    div.className = "cart-item";
    div.innerText = i;
    box.appendChild(div);
  });
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

</script>

</body>
</html>
