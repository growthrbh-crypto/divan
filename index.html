<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIVAN Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: #f9f6f1;
    color: #111;
    overflow-x: hidden;
}

/* NAV */
.nav {
    position: fixed;
    width: 100%;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
    z-index: 1000;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1611080626919-7cf5a9f6c4f2') center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    color: white;
    letter-spacing: 2px;
}

.hero p {
    color: #ddd;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 15px 35px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(135deg,#e6d3b3,#cbb38a);
    cursor: pointer;
    transition: 0.4s;
}

.btn:hover {
    transform: scale(1.08);
}

/* SECTION */
.section {
    padding: 120px 60px;
}

/* PRODUCTS GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
    gap: 50px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 25px;
    background: white;
    transition: 0.5s;
}

.card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    transition: 0.6s;
}

.card:hover img {
    transform: scale(1.1);
}

/* CARD CONTENT */
.card-content {
    padding: 25px;
}

.price {
    font-weight: bold;
    color: #0b132b;
}

/* SCROLL ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* CTA */
.cta {
    text-align: center;
    padding: 100px;
    background: #0b132b;
    color: white;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #000;
    color: white;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div>DIVAN</div>
    <div>Luxury Care</div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>DIVAN</h1>
        <p>Where Luxury Meets Skin</p>
        <button class="btn">Shop Now</button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section">
    <div class="products">

        <div class="card fade">
            <img src="https://images.unsplash.com/photo-1596755389378-c31d21fd1273">
            <div class="card-content">
                <h3>مقشر السكر الرغوي</h3>
                <p class="price">27.75 ر.س</p>
            </div>
        </div>

        <div class="card fade">
            <img src="https://images.unsplash.com/photo-1585386959984-a41552262a5a">
            <div class="card-content">
                <h3>غسول فاخر</h3>
                <p class="price">35 ر.س</p>
            </div>
        </div>

        <div class="card fade">
            <img src="https://images.unsplash.com/photo-1608248597279-f99d160bfcbc">
            <div class="card-content">
                <h3>كريم ترطيب</h3>
                <p class="price">45 ر.س</p>
            </div>
        </div>

    </div>
</div>

<!-- CTA -->
<div class="cta">
    <h2>ابدئي رحلتك مع الفخامة</h2>
    <button class="btn">اطلبي الآن</button>
</div>

<!-- FOOTER -->
<div class="footer">
    © DIVAN 2026
</div>

<script>

/* Scroll Animation */
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    fades.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});

</script>

</body>
</html>
