<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DIVAN | Luxury Care</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Tajawal', sans-serif;
    background: #f8f5ef;
    color: #111;
}

/* NAVBAR */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: #0b132b;
    color: white;
}

.logo {
    font-weight: 700;
    letter-spacing: 2px;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1600180758890-6b94519a8ba8') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 45px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 18px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    background: #e6d3b3;
    color: #000;
    padding: 15px 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    border-radius: 30px;
    transition: 0.3s;
}

.btn:hover {
    background: #d4c0a1;
}

/* SECTION */
.section {
    padding: 80px 40px;
    max-width: 1200px;
    margin: auto;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 30px;
}

.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.card-content {
    padding: 20px;
}

.price {
    color: #0b132b;
    font-weight: bold;
}

/* FEATURE STRIP */
.strip {
    background: #0b132b;
    color: white;
    text-align: center;
    padding: 40px;
}

/* CTA */
.cta {
    text-align: center;
    margin-top: 50px;
}

/* FOOTER */
.footer {
    background: #0b132b;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 50px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">DIVAN</div>
    <div>Luxury Care</div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>الفخامة تبدأ من بشرتك</h1>
        <p>منتجات عناية مصممة لتمنحك تجربة استثنائية</p>
        <button class="btn">اكتشفي الآن</button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section">
    <h2>منتجاتنا</h2>

    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1608248597279-f99d160bfcbc">
            <div class="card-content">
                <h3>مقشر السكر الرغوي</h3>
                <p class="price">27.75 ر.س</p>
                <button class="btn">شراء</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1596755389378-c31d21fd1273">
            <div class="card-content">
                <h3>غسول فاخر</h3>
                <p class="price">35 ر.س</p>
                <button class="btn">شراء</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585386959984-a41552262a5a">
            <div class="card-content">
                <h3>كريم ترطيب</h3>
                <p class="price">45 ر.س</p>
                <button class="btn">شراء</button>
            </div>
        </div>

    </div>
</div>

<!-- STRIP -->
<div class="strip">
    ✨ أكثر من 10,000 عميلة تثق بنا
</div>

<!-- CTA -->
<div class="section cta">
    <h2>جاهزة لتجربة الفخامة؟</h2>
    <button class="btn">اطلبي الآن</button>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 DIVAN - All Rights Reserved
</div>

<script>
document.querySelectorAll(".btn").forEach(btn=>{
    btn.onclick = () => alert("تمت الإضافة للسلة 🛒");
});
</script>

</body>
</html>
